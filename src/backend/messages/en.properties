# User-facing backend messages
account.locked_negative_balance=Your account is locked due to a negative credit balance. Please join the waiting list for more credits.
account.free_trial_expired=Your free trial credits have expired.
account.insufficient_credits=Insufficient credits. This render requires ~{estimated_credits} credits, but you only have {available_credits} available.
job.take_ready=Your take is ready.
job.start_failed_retry=Couldn't start the take. Please retry.
job.start_failed_billing_rollback_pending=Couldn't start the take, and billing rollback still needs repair. Please retry later.
job.finish_failed=Couldn't finish the take.
job.cancelled=That take was cancelled.
job.cancelled_billing_rollback_failed=That take was cancelled, but billing rollback failed. Support intervention required.
job.audio_generated_billing_failed_no_charge=Audio was generated but billing could not be finalized. No credits were charged. Please try again.
job.audio_generated_billing_rollback_failed=Audio was generated, but billing rollback failed. No audio was delivered. Support intervention required.
job.audio_generation_and_billing_rollback_failed=Audio generation failed, and billing rollback failed. Support intervention required.
billing.setup_failed_retry=Couldn't start the take because billing setup failed. Please retry.
